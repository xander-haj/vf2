# Builds the locked Vite project and publishes its dist directory through GitHub Pages.
name: Deploy Voxel Frontier to GitHub Pages

# Deploy main automatically while retaining a manual recovery trigger.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# GitHub Pages uses OIDC for deployment; source access remains read-only.
permissions:
  contents: read
  pages: write
  id-token: write

# A newer push supersedes an older deployment that has not completed yet.
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Full commit pins prevent a floating action tag from changing the executed code unexpectedly.
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # Node 22.12 is the minimum supported release in the project's documented Node 22 line.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.12.0
          cache: npm

      # npm ci verifies that package.json and package-lock.json agree before installing exact locked packages.
      - name: Install locked dependencies
        run: npm ci

      # The existing build script performs strict TypeScript validation before Vite emits dist.
      - name: Build production site
        run: npm run build

      # Pages metadata connects the uploaded static artifact to the repository's Pages environment.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      # Only compiled static output is published; source, dependencies, and environment files are excluded.
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./dist

      # The deployment step publishes the immutable artifact and exposes its final URL as a job output.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
